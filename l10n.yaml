# Configuration for `flutter gen-l10n`. Generates a strongly-typed
# `AppLocalizations` class from the ARB files in `lib/l10n/`.
#
# Run: `flutter gen-l10n` (also runs automatically on `flutter pub get`
# when `generate: true` is set in pubspec.yaml).

arb-dir: lib/l10n
template-arb-file: app_en.arb
output-localization-file: app_localizations.dart
output-class: AppLocalizations
output-dir: lib/l10n/generated
nullable-getter: false
